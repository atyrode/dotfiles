providers:
  webSearch: auto

symbolPreset: unicode
colorBlindMode: true

modelRoles:
  default: openai-codex/gpt-5.6-sol:medium
  advisor: anthropic/claude-haiku-4-5:low
  smol: openai-codex/gpt-5.6-luna:low
  task: openai-codex/gpt-5.6-terra:medium
  sonic: openai-codex/gpt-5.6-luna:minimal
  librarian: openai-codex/gpt-5.6-terra:medium
  designer: anthropic/claude-sonnet-5:medium
  reviewer: anthropic/claude-sonnet-5:high
  plan: anthropic/claude-fable-5:high
  slow: openai-codex/gpt-5.6-sol:xhigh
  tiny: openai-codex/gpt-5.6-luna:low
  commit: openai-codex/gpt-5.6-luna:low

retry:
  enabled: true
  modelFallback: true
  fallbackRevertPolicy: cooldown-expiry
  # Redundancy first: a same-provider sibling backs each lead before the cross,
  # so a single-model outage never leaves its bucket; then the matched pair on
  # the other provider. Chains never route below the lead's tier. Spark (drain)
  # and Fable (elite) draw separate quota and never appear as a net — plan leads
  # on Fable deliberately and falls back to main-plan Opus. Trivial roles carry
  # no chain: a blip on commit/tiny/sonic is harmless.
  fallbackChains:
    default:
      - openai-codex/gpt-5.6-terra:medium
      - anthropic/claude-opus-4-8:medium
      - anthropic/claude-sonnet-5:medium
    task:
      - openai-codex/gpt-5.6-sol:medium
      - anthropic/claude-sonnet-5:medium
      - anthropic/claude-opus-4-8:medium
    plan:
      - anthropic/claude-opus-4-8:high
      - openai-codex/gpt-5.6-sol:high
      - openai-codex/gpt-5.6-terra:high
    slow:
      - openai-codex/gpt-5.6-terra:xhigh
      - anthropic/claude-opus-4-8:xhigh
      - anthropic/claude-sonnet-5:xhigh
    designer:
      - anthropic/claude-opus-4-8:medium
      - openai-codex/gpt-5.6-terra:medium
      - openai-codex/gpt-5.6-sol:medium
    reviewer:
      - anthropic/claude-opus-4-8:high
      - openai-codex/gpt-5.6-terra:high
      - openai-codex/gpt-5.6-sol:high
    librarian:
      - openai-codex/gpt-5.6-sol:medium
      - anthropic/claude-sonnet-5:medium
      - anthropic/claude-opus-4-8:medium

personality: pragmatic

advisor:
  enabled: true
  subagents: false
  syncBacklog: "1"

stt:
  enabled: true

branchSummary:
  enabled: true

autolearn:
  enabled: true
  # One extra billed self-reflection turn at every session end is not a
  # default; capture lessons deliberately instead (operator review 2026-07-11).
  autoContinue: false

github:
  enabled: true

checkpoint:
  enabled: true

# v17 made both settings opt-in. This repository deliberately keeps structural
# search available and trades occasional extra reads for unseen-line edit safety.
astGrep:
  enabled: true
edit:
  enforceSeenLines: true

statusLine:
  preset: default
  compactThinkingLevel: false
  transparent: false

terminal:
  showProgress: true

tui:
  tight: false

display:
  shimmer: classic
  showTokenUsage: false
  cacheMissMarker: false

codexResets:
  autoRedeem: "no"

task:
  showResolvedModelBadge: true
  agentModelOverrides:
    designer: anthropic/claude-sonnet-5:medium
    librarian: openai-codex/gpt-5.6-terra:medium
    reviewer: anthropic/claude-sonnet-5:high
    sonic: openai-codex/gpt-5.6-luna:minimal
    task: openai-codex/gpt-5.6-terra:medium
  disabledAgents: []

memory:
  backend: local

theme:
  dark: titanium

browser:
  headless: true
  enabled: true

proseOnlyThinking: false
defaultThinkingLevel: medium
