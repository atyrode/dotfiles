providers:
  webSearch: auto

symbolPreset: unicode
colorBlindMode: true

modelRoles:
  default: openai-codex/gpt-5.6-sol:medium
  advisor: openai-codex/gpt-5.6-luna:low
  smol: openai-codex/gpt-5.6-luna:low
  task: openai-codex/gpt-5.6-terra:medium
  sonic: openai-codex/gpt-5.6-luna:minimal
  librarian: openai-codex/gpt-5.6-terra:medium
  designer: anthropic/claude-sonnet-5:medium
  reviewer: anthropic/claude-sonnet-5:high
  plan: anthropic/claude-fable-5:high
  slow: openai-codex/gpt-5.6-sol:xhigh
  tiny: openai-codex/gpt-5.6-luna:minimal
  commit: openai-codex/gpt-5.6-luna:low

retry:
  enabled: true
  modelFallback: true
  fallbackRevertPolicy: cooldown-expiry
  fallbackChains:
    default:
      - anthropic/claude-sonnet-5:medium
      - openai-codex/gpt-5.6-terra:medium
    advisor:
      - openai-codex/gpt-5.6-terra:low
      - anthropic/claude-sonnet-5:medium
    smol:
      - openai-codex/gpt-5.6-terra:low
    task:
      - anthropic/claude-sonnet-5:medium
      - openai-codex/gpt-5.6-sol:medium
    sonic:
      - openai-codex/gpt-5.6-terra:low
    librarian:
      - anthropic/claude-sonnet-5:medium
      - openai-codex/gpt-5.6-luna:high
    designer:
      - openai-codex/gpt-5.6-sol:high
      - anthropic/claude-fable-5:medium
    reviewer:
      - anthropic/claude-opus-4-8:high
      - openai-codex/gpt-5.6-sol:high
    plan:
      - anthropic/claude-opus-4-8:high
      - openai-codex/gpt-5.6-sol:high
    slow:
      - anthropic/claude-opus-4-8:high
      - openai-codex/gpt-5.6-terra:xhigh
    tiny:
      - openai-codex/gpt-5.6-terra:low
    commit:
      - openai-codex/gpt-5.6-terra:low

personality: pragmatic

advisor:
  enabled: true
  subagents: false
  syncBacklog: "1"

stt:
  enabled: true

branchSummary:
  enabled: true

autolearn:
  enabled: true
  autoContinue: true

github:
  enabled: true

checkpoint:
  enabled: true

statusLine:
  preset: default
  compactThinkingLevel: false
  transparent: false

terminal:
  showProgress: true

tui:
  tight: false

display:
  shimmer: classic
  showTokenUsage: false
  cacheMissMarker: false

codexResets:
  autoRedeem: "no"

task:
  showResolvedModelBadge: true
  agentModelOverrides:
    designer: anthropic/claude-sonnet-5:medium
    librarian: openai-codex/gpt-5.6-terra:medium
    reviewer: anthropic/claude-sonnet-5:high
    sonic: openai-codex/gpt-5.6-luna:minimal
    task: openai-codex/gpt-5.6-terra:medium
  disabledAgents: []

memory:
  backend: local

theme:
  dark: dark

browser:
  headless: true
  enabled: true

proseOnlyThinking: false
defaultThinkingLevel: medium
