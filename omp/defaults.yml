providers:
  webSearch: auto

symbolPreset: unicode
colorBlindMode: true

modelRoles:
  default: openai-codex/gpt-5.6-sol:medium
  advisor: openai-codex/gpt-5.6-luna:low
  smol: openai-codex/gpt-5.6-luna:low
  task: openai-codex/gpt-5.6-terra:medium
  sonic: openai-codex/gpt-5.6-luna:minimal
  librarian: openai-codex/gpt-5.6-terra:medium
  designer: anthropic/claude-sonnet-5:medium
  reviewer: anthropic/claude-sonnet-5:high
  plan: anthropic/claude-fable-5:high
  slow: openai-codex/gpt-5.6-sol:xhigh
  tiny: openai-codex/gpt-5.4-nano:low
  commit: openai-codex/gpt-5.4-nano:low

retry:
  enabled: true
  modelFallback: true
  fallbackRevertPolicy: cooldown-expiry
  # Sibling first (rules out one model at capacity for free), cross last (the
  # load-bearing step reaches the other provider). Trivial roles carry no chain:
  # a blip on commit/tiny/sonic is harmless and crossing them is wasteful.
  fallbackChains:
    default:
      - openai-codex/gpt-5.6-terra:medium
      - anthropic/claude-sonnet-5:medium
    task:
      - openai-codex/gpt-5.6-luna:medium
      - anthropic/claude-sonnet-5:medium
    plan:
      - anthropic/claude-opus-4-8:high
      - openai-codex/gpt-5.6-sol:high
    slow:
      - openai-codex/gpt-5.6-terra:xhigh
      - anthropic/claude-opus-4-8:xhigh
    designer:
      - openai-codex/gpt-5.6-terra:medium
    reviewer:
      - anthropic/claude-opus-4-8:high
      - openai-codex/gpt-5.6-sol:high
    librarian:
      - openai-codex/gpt-5.6-luna:medium
      - anthropic/claude-sonnet-5:medium

personality: pragmatic

advisor:
  enabled: true
  subagents: false
  syncBacklog: "1"

stt:
  enabled: true

branchSummary:
  enabled: true

autolearn:
  enabled: true
  # One extra billed self-reflection turn at every session end is not a
  # default; capture lessons deliberately instead (operator review 2026-07-11).
  autoContinue: false

github:
  enabled: true

checkpoint:
  enabled: true

statusLine:
  preset: default
  compactThinkingLevel: false
  transparent: false

terminal:
  showProgress: true

tui:
  tight: false

display:
  shimmer: classic
  showTokenUsage: false
  cacheMissMarker: false

codexResets:
  autoRedeem: "no"

task:
  showResolvedModelBadge: true
  agentModelOverrides:
    designer: anthropic/claude-sonnet-5:medium
    librarian: openai-codex/gpt-5.6-terra:medium
    reviewer: anthropic/claude-sonnet-5:high
    sonic: openai-codex/gpt-5.6-luna:minimal
    task: openai-codex/gpt-5.6-terra:medium
  disabledAgents: []

memory:
  backend: local

theme:
  dark: titanium

browser:
  headless: true
  enabled: true

proseOnlyThinking: false
defaultThinkingLevel: medium
